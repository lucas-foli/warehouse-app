# Supabase config — fonte de verdade para configurações do Auth aplicáveis
# via `supabase config push` (CLI >= 2.x). Para o restante das opções, mantemos
# o default (Dashboard) — só listamos aqui o que precisa divergir do default.
#
# Aplicar (após revisar diff):
#   supabase config push
#
# Ou, alternativamente, replicar os valores abaixo em:
#   Supabase Dashboard → Authentication → Rate Limits / Emails

project_id = "tifkcrkadxozwahjdsmd"

[auth.email]
# Intervalo mínimo entre dois emails enviados ao MESMO endereço.
# Default Supabase: 60s (gera a sensação de "só posso pedir reset 2x por dia"
# quando combinado com o cap de 2/hora do SMTP nativo). Reduzimos para 20s,
# pois o controle anti-abuso real fica nos limites por IP em [auth.rate_limit].
max_frequency = "20s"

[auth.rate_limit]
# Total de emails enviados por hora pelo Auth (recovery, signup confirmation,
# email change, magic link, invite). É um teto GLOBAL do projeto.
# Default: 2/hora (válido só para o SMTP embutido do Supabase, voltado a dev).
# Para usar este valor maior, é OBRIGATÓRIO configurar SMTP próprio em
# Authentication → SMTP Settings (ex.: Resend, SES, SendGrid, Postmark).
email_sent = 100

# Tentativas de signup/sign-in (excluindo anônimos) por IP a cada 5 minutos.
# Mantém default — protege contra brute force vindo de um mesmo endereço,
# sem penalizar o usuário legítimo que esqueceu a senha algumas vezes.
sign_in_sign_ups = 30

# Verificações de OTP / magic link por IP a cada 5 minutos.
token_verifications = 30

# Refresh de sessão por IP a cada 5 minutos. Mantém default.
token_refresh = 150

# Sign-ins anônimos por IP por hora. Mantém default.
anonymous_users = 30
